# Example: Automated Trading Bot
# A sophisticated trading agent with risk management

name: trading-bot
version: "1.0"
description: Automated trading with risk management and compliance

triggers:
  - type: schedule
    cron: "*/5 * * * *"  # Every 5 minutes
  - type: price
    condition: btc_usd_change > 0.02  # 2% price movement

agents:
  # Market data collector
  - name: market_data
    type: market-data-agent
    config:
      exchanges:
        - name: binance
          symbols: [BTC/USDT, ETH/USDT, SOL/USDT]
          timeframe: 5m
        - name: coinbase
          symbols: [BTC/USD, ETH/USD]
          timeframe: 5m
      indicators:
        - rsi
        - macd
        - bollinger_bands
    capabilities:
      - L3_NetworkOut
      - L2_FileWrite
    memory: 256MB

  # Strategy analyzer
  - name: strategy
    type: trading-strategy
    config:
      strategies:
        - name: trend_following
          weight: 0.4
          params:
            short_ema: 12
            long_ema: 26
        - name: mean_reversion
          weight: 0.3
          params:
            lookback: 20
            threshold: 2.0
        - name: momentum
          weight: 0.3
          params:
            period: 14
    capabilities:
      - L1_FileRead
      - L0_LocalCompute
    memory: 512MB
    depends_on: [market_data]

  # Risk manager
  - name: risk_manager
    type: risk-agent
    config:
      max_position_size: 0.1  # 10% of portfolio
      max_drawdown: 0.05      # 5% max drawdown
      stop_loss: 0.02         # 2% stop loss
      take_profit: 0.05       # 5% take profit
      daily_trade_limit: 10
      cooldown_period: 300    # 5 minutes
    capabilities:
      - L7_ChainRead
    memory: 128MB
    depends_on: [strategy]

  # Execution agent
  - name: executor
    type: trade-executor
    config:
      exchange: binance
      order_type: limit
      slippage_tolerance: 0.001
      timeout: 30
    capabilities:
      - L8_ChainWriteLow
      - L3_NetworkOut
    memory: 256MB
    depends_on: [risk_manager]
    tee_required: true  # Sensitive operation

  # Compliance agent
  - name: compliance
    type: compliance-agent
    config:
      rules:
        - check_trading_hours
        - check_position_limits
        - check_wash_trading
      report_destination: ${COMPLIANCE_WEBHOOK}
    capabilities:
      - L3_NetworkOut
    memory: 128MB
    depends_on: [executor]

  # Portfolio tracker
  - name: portfolio
    type: portfolio-agent
    config:
      rebalance_threshold: 0.05
      target_allocation:
        BTC: 0.4
        ETH: 0.3
        SOL: 0.2
        USDT: 0.1
    capabilities:
      - L7_ChainRead
    memory: 256MB

workflow:
  steps:
    - name: collect_data
      agent: market_data
      action: fetch_ohlcv
      timeout: 30s
      retry: 3

    - name: analyze
      agent: strategy
      action: generate_signals
      input: ${collect_data.ohlcv}
      timeout: 1m

    - name: assess_risk
      agent: risk_manager
      action: evaluate_trade
      input:
        signals: ${analyze.signals}
        portfolio: ${portfolio.current}
      timeout: 30s

    - name: check_compliance
      agent: compliance
      action: pre_trade_check
      input: ${assess_risk.proposed_trade}
      condition: ${assess_risk.approved} == true
      timeout: 10s

    - name: execute
      agent: executor
      action: place_order
      input: ${assess_risk.proposed_trade}
      condition: ${check_compliance.approved} == true
      timeout: 1m

    - name: update_portfolio
      agent: portfolio
      action: update_positions
      input: ${execute.fill}
      timeout: 30s

    - name: report_trade
      agent: compliance
      action: log_trade
      input:
        trade: ${execute.fill}
        risk: ${assess_risk.metrics}
      timeout: 10s

risk_controls:
  circuit_breakers:
    - condition: daily_loss > 0.05
      action: halt_trading
      duration: 24h
    - condition: consecutive_errors > 5
      action: notify_admin
      action2: pause_strategy

  kill_switch:
    enabled: true
    trigger: ${KILL_SWITCH_WEBHOOK}
    action: close_all_positions

monitoring:
  dashboard:
    enabled: true
    port: 9090
  
  metrics:
    - pnl
    - sharpe_ratio
    - max_drawdown
    - win_rate
    - trade_count
  
  alerts:
    - condition: daily_pnl < -1000
      severity: critical
    - condition: drawdown > 0.03
      severity: warning
