# Lefthook git hooks configuration

pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt -- --check
    clippy:
      glob: "*.rs"
      run: cargo clippy -- -D warnings
    test:
      glob: "*.rs"
      run: cargo test --lib

pre-push:
  parallel: true
  commands:
    test:
      run: cargo test --workspace
    fmt-check:
      run: cargo fmt --all -- --check

commit-msg:
  commands:
    lint:
      run: commitlint --edit {1}
