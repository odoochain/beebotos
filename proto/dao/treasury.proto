syntax = "proto3";

package beebotos.dao.treasury;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/beebotos/beebotos/proto/dao";

// Treasury management messages
message Treasury {
  string address = 1;
  repeated Asset assets = 2;
  repeated Budget budgets = 3;
  repeated Stream streams = 4;
  google.protobuf.Timestamp created_at = 5;
}

message Asset {
  string token_address = 1;
  string token_symbol = 2;
  int32 decimals = 3;
  string balance = 4;
  string reserved = 5;  // Amount reserved for obligations
  AssetType asset_type = 6;
}

enum AssetType {
  ASSET_UNSPECIFIED = 0;
  ASSET_NATIVE = 1;
  ASSET_ERC20 = 2;
  ASSET_ERC721 = 3;
  ASSET_LP_TOKEN = 4;
}

// Budget management
message Budget {
  string budget_id = 1;
  string category = 2;
  string quarter = 3;  // e.g., "2026-Q1"
  string allocated = 4;
  string spent = 5;
  string remaining = 6;
  BudgetStatus status = 7;
  google.protobuf.Timestamp created_at = 8;
}

enum BudgetStatus {
  BUDGET_UNSPECIFIED = 0;
  BUDGET_ACTIVE = 1;
  BUDGET_EXHAUSTED = 2;
  BUDGET_FROZEN = 3;
}

message SetBudgetRequest {
  string category = 1;
  string quarter = 2;
  string amount = 3;
  string proposer = 4;
}

message ExecuteSpendingRequest {
  string budget_id = 1;
  string amount = 2;
  string recipient = 3;
  string justification = 4;
  string executor = 5;
}

// Streaming payments
message Stream {
  uint64 stream_id = 1;
  string sender = 2;
  string recipient = 3;
  string token = 4;
  string rate_per_second = 5;
  google.protobuf.Timestamp start_time = 6;
  google.protobuf.Timestamp stop_time = 7;
  string withdrawn = 8;
  StreamStatus status = 9;
}

enum StreamStatus {
  STREAM_UNSPECIFIED = 0;
  STREAM_ACTIVE = 1;
  STREAM_PAUSED = 2;
  STREAM_COMPLETED = 3;
  STREAM_CANCELLED = 4;
}

message CreateStreamRequest {
  string sender = 1;
  string recipient = 2;
  string token = 3;
  string rate_per_second = 4;
  google.protobuf.Duration duration = 5;
}

message WithdrawFromStreamRequest {
  uint64 stream_id = 1;
  string recipient = 2;
}

// Transactions
message TreasuryTransaction {
  string tx_hash = 1;
  TransactionType type = 2;
  string token = 3;
  string amount = 4;
  string from_address = 5;
  string to_address = 6;
  google.protobuf.Timestamp timestamp = 7;
  string description = 8;
}

enum TransactionType {
  TX_UNSPECIFIED = 0;
  TX_DEPOSIT = 1;
  TX_WITHDRAWAL = 2;
  TX_STREAM_START = 3;
  TX_STREAM_WITHDRAW = 4;
  TX_BUDGET_ALLOCATION = 5;
  TX_BUDGET_SPEND = 6;
}

// Queries
message GetTreasuryRequest {
  string treasury_address = 1;
}

message GetTreasuryResponse {
  Treasury treasury = 1;
  repeated TreasuryTransaction recent_transactions = 2;
}

message ListTransactionsRequest {
  string treasury_address = 1;
  TransactionType filter_type = 2;
  google.protobuf.Timestamp start_time = 3;
  google.protobuf.Timestamp end_time = 4;
  int32 page_size = 5;
  string page_token = 6;
}

message ListTransactionsResponse {
  repeated TreasuryTransaction transactions = 1;
  string next_page_token = 2;
  map<string, string> totals = 3;  // token -> total amount
}

// Events
message DepositEvent {
  string token = 1;
  string amount = 2;
  string sender = 3;
  google.protobuf.Timestamp deposited_at = 4;
}

message BudgetAllocatedEvent {
  string budget_id = 1;
  string category = 2;
  string amount = 3;
  google.protobuf.Timestamp allocated_at = 4;
}

message StreamCreatedEvent {
  uint64 stream_id = 1;
  string sender = 2;
  string recipient = 3;
  string rate_per_second = 4;
  google.protobuf.Timestamp created_at = 5;
}
