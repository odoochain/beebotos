# Default values for BeeBotOS
replicaCount: 1

image:
  repository: beebotos/beebotos
  pullPolicy: IfNotPresent
  tag: "1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

services:
  gateway:
    type: ClusterIP
    port: 8080
  beehub:
    type: ClusterIP
    port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: beebotos.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 1000m
    memory: 2Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# BeeBotOS specific configuration
config:
  logLevel: info
  maxAgents: 1000
  schedulerAlgorithm: cfs
  teeEnabled: false
  auditEnabled: true

# Blockchain configuration
blockchain:
  rpcUrl: "https://rpc.testnet.monad.xyz"
  chainId: 10143

# Persistence
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
