apiVersion: v1
kind: Service
metadata:
  name: beebotos-daemon
  namespace: beebotos
  labels:
    app.kubernetes.io/name: beebotos
    app.kubernetes.io/component: daemon
spec:
  selector:
    app.kubernetes.io/name: beebotos
    app.kubernetes.io/component: daemon
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: beebotos-gateway
  namespace: beebotos
  labels:
    app.kubernetes.io/name: beebotos
    app.kubernetes.io/component: gateway
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: beebotos
    app.kubernetes.io/component: gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: https
      port: 443
      targetPort: 8443
---
apiVersion: v1
kind: Service
metadata:
  name: beebotos-metrics
  namespace: beebotos
  labels:
    app.kubernetes.io/name: beebotos
    app.kubernetes.io/component: metrics
spec:
  selector:
    app.kubernetes.io/name: beebotos
    app.kubernetes.io/component: daemon
  ports:
    - name: prometheus
      port: 9090
      targetPort: 9090
