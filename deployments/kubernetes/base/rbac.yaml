apiVersion: v1
kind: ServiceAccount
metadata:
  name: beebotos
  namespace: beebotos
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: beebotos
  namespace: beebotos
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: beebotos
  namespace: beebotos
subjects:
  - kind: ServiceAccount
    name: beebotos
    namespace: beebotos
roleRef:
  kind: Role
  name: beebotos
  apiGroup: rbac.authorization.k8s.io
