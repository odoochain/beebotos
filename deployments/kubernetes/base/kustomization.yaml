apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: beebotos

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - rbac.yaml
  - configmap.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

commonLabels:
  app.kubernetes.io/part-of: beebotos
  app.kubernetes.io/managed-by: kustomize

images:
  - name: beebotos/daemon
    newTag: v2.0.0
  - name: beebotos/gateway
    newTag: v2.0.0
