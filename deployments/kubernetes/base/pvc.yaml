apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: beebotos-data
  namespace: beebotos
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: fast-ssd
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: beebotos-storage
  namespace: beebotos
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 500Gi
  storageClassName: shared-storage
