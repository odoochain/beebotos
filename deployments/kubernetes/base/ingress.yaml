apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: beebotos
  namespace: beebotos
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  tls:
    - hosts:
        - api.beebotos.io
        - ws.beebotos.io
      secretName: beebotos-tls
  rules:
    - host: api.beebotos.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: beebotos-gateway
                port:
                  number: 80
    - host: ws.beebotos.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: beebotos-gateway
                port:
                  number: 8081
