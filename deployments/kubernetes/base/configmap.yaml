apiVersion: v1
kind: ConfigMap
metadata:
  name: beebotos-config
  namespace: beebotos
data:
  config.toml: |
    [daemon]
    log_level = "info"
    
    [agent]
    max_concurrent = 1000
    default_memory_limit = 268435456
    
    [chain]
    network = "mainnet"
    rpc_url = "https://rpc.monad.io"
    
    [metrics]
    enabled = true
    endpoint = "0.0.0.0:9090"
    
    [p2p]
    enabled = true
    max_peers = 100
