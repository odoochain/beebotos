apiVersion: apps/v1
kind: Deployment
metadata:
  name: beebotos-daemon
  namespace: beebotos
  labels:
    app.kubernetes.io/name: beebotos
    app.kubernetes.io/component: daemon
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: beebotos
      app.kubernetes.io/component: daemon
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beebotos
        app.kubernetes.io/component: daemon
    spec:
      serviceAccountName: beebotos
      containers:
        - name: daemon
          image: beebotos/daemon:latest
          ports:
            - name: grpc
              containerPort: 50051
            - name: metrics
              containerPort: 9090
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          volumeMounts:
            - name: data
              mountPath: data
            - name: config
              mountPath: config
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: beebotos-data
        - name: config
          configMap:
            name: beebotos-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beebotos-gateway
  namespace: beebotos
  labels:
    app.kubernetes.io/name: beebotos
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: beebotos
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beebotos
        app.kubernetes.io/component: gateway
    spec:
      containers:
        - name: gateway
          image: beebotos/gateway:latest
          ports:
            - name: http
              containerPort: 8080
            - name: ws
              containerPort: 8081
          env:
            - name: DAEMON_ENDPOINT
              value: "beebotos-daemon:50051"
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
