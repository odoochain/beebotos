apiVersion: apps/v1
kind: Deployment
metadata:
  name: dao
  namespace: beebotos
  labels:
    app: dao
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dao
  template:
    metadata:
      labels:
        app: dao
    spec:
      containers:
        - name: dao
          image: beebotos/dao:v2.0.0
          ports:
            - containerPort: 8083
              name: grpc
          env:
            - name: RUST_LOG
              value: "info"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: beebotos-secrets
                  key: database-url
            - name: RPC_URL
              valueFrom:
                secretKeyRef:
                  name: beebotos-secrets
                  key: rpc-url
          volumeMounts:
            - name: config
              mountPath: config
            - name: data
              mountPath: data/dao
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: beebotos-config
            items:
              - key: dao.yaml
                path: dao.yaml
        - name: data
          persistentVolumeClaim:
            claimName: dao-data
---
apiVersion: v1
kind: Service
metadata:
  name: dao
  namespace: beebotos
spec:
  selector:
    app: dao
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dao-data
  namespace: beebotos
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
