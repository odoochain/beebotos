apiVersion: v1
kind: Service
metadata:
  name: {{ include "beebotos.fullname" . }}-gateway
  labels:
    app: {{ include "beebotos.name" . }}
spec:
  type: {{ .Values.services.gateway.type }}
  ports:
    - port: {{ .Values.services.gateway.port }}
      targetPort: 8080
      protocol: TCP
  selector:
    app: {{ include "beebotos.name" . }}
