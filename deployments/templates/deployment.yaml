apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "beebotos.fullname" . }}
  labels:
    app: {{ include "beebotos.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "beebotos.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "beebotos.name" . }}
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: RUST_LOG
              value: {{ .Values.config.logLevel }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
