apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "beebotos.fullname" . }}-config
  labels:
    {{- include "beebotos.labels" . | nindent 4 }}
data:
  RUST_LOG: {{ .Values.config.logLevel | quote }}
  RUST_BACKTRACE: {{ .Values.config.backtrace | quote }}
  {{- range $key, $value := .Values.config.extra }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
