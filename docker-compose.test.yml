version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: A123123
      POSTGRES_DB: beebotos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: docker/test-lark.dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:A123123@postgres:5432/beebotos
      - JWT_SECRET=${JWT_SECRET}
      - KIMI_API_KEY=${KIMI_API_KEY}
      - LARK_APP_ID=${LARK_APP_ID}
      - LARK_APP_SECRET=${LARK_APP_SECRET}
      - LARK_VERIFICATION_TOKEN=${LARK_VERIFICATION_TOKEN}
      - RUST_LOG=info
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
    command: ["/app/beebotos-gateway"]

volumes:
  postgres_data:
